<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cymatics 3D - True Volumetric Swarm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
#canvas3d { width: 560px; height: 560px; margin: 6px auto; border-radius: 50%; overflow: hidden; position: relative;}
#controls{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;padding:10px 16px;max-width:650px; z-index: 10;}
button,select{background:#2a2a3a;color:#e0e0e0;border:1px solid #444;padding:8px 18px;border-radius:6px;font-size:14px;cursor:pointer}
select{max-width:180px;text-overflow:ellipsis}
button:hover{background:#3a3a4a}
button.active{background:#4a6fa5;border-color:#6a8fc5}
.sg{display:flex;flex-direction:column;align-items:center;font-size:11px}
.sg input{width:100px}
#pitch{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 16px;font-variant-numeric:tabular-nums; z-index: 10;}
#noteName{font-size:56px;font-weight:800;min-width:100px;text-align:center;color:#e0e0e0;letter-spacing:-2px;transition:color 0.2s}
#pitchRight{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
#cents{font-size:16px;font-weight:600;min-width:80px;transition:color 0.2s}
#centsBar{width:180px;height:10px;background:#1a1a2a;border-radius:5px;position:relative;overflow:hidden;border:1px solid #2a2a3a}
#centsIndicator{position:absolute;width:6px;height:100%;background:#4a9ed6;border-radius:3px;left:50%;transform:translateX(-50%);transition:left 0.15s ease-out}
#centsCenter{position:absolute;width:2px;height:100%;background:#444;left:calc(50% - 1px)}
#freqSmall{font-size:13px;color:#666}
#info{display:flex;gap:20px;font-size:12px;color:#888;padding:2px; z-index: 10;}
#info span{font-variant-numeric:tabular-nums}
#palettes{display:flex;gap:8px;justify-content:center;padding:6px}
.pdot{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color 0.2s}
.pdot:hover{border-color:rgba(255,255,255,0.5)}
.pdot.active{border-color:#fff}
</style>
<script src="three.min.js"></script>
<script src="OrbitControls.js"></script>
</head>
<body>
<div id="info">
  <span id="dMode">Mode --</span>
  <span id="dCount">--</span>
  <span id="dFps">-- fps</span>
</div>

<div id="canvas3d"></div>

<div id="pitch">
  <span id="noteName">--</span>
  <div id="pitchRight">
    <div id="centsBar"><div id="centsCenter"></div><div id="centsIndicator"></div></div>
    <div id="cents">&nbsp;</div>
    <span id="freqSmall">-- Hz</span>
  </div>
</div>
<div id="controls">
  <select id="inputDevice"><option value="">Default mic</option></select>
  <button id="btnStart">Start</button>
  <button id="btnMode">Voice</button>
  <button id="btnReset">Reset Particles</button>
  <button id="btnCam">Reset Cam</button>
  <div class="sg"><label>Sensitivity</label><input type="range" id="slSens" min="0.5" max="5" step="0.1" value="2"></div>
  <div class="sg"><label>Particles</label><input type="range" id="slCount" min="3000" max="30000" step="1000" value="15000"></div>
</div>
<div id="palettes"></div>

<script>
(function(){
"use strict";

var IS_MOBILE = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
var MAX_P = IS_MOBILE ? 8000 : 30000;
var GRID = 128;

var NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
var freqHistory = [];
var SMOOTH_FRAMES = 9;
var smoothedFreq = 0, smoothedCents = 0;

function freqToNote(freq){
  if(freq < 20) return null;
  var semitones = 12 * Math.log2(freq / 440);
  var rounded = Math.round(semitones);
  var cents = (semitones - rounded) * 100;
  var midi = rounded + 69;
  if(midi < 0 || midi > 127) return null;
  var name = NOTE_NAMES[((midi % 12) + 12) % 12];
  var octave = Math.floor(midi / 12) - 1;
  return {name: name, octave: octave, cents: cents, midi: midi};
}

function smoothPitch(freq){
  freqHistory.push(freq);
  if(freqHistory.length > SMOOTH_FRAMES) freqHistory.shift();
  var sorted = freqHistory.slice().sort(function(a,b){return a-b;});
  var median = sorted[sorted.length >> 1];
  var alpha = 0.25;
  smoothedFreq += (median - smoothedFreq) * alpha;
  return smoothedFreq;
}

var audioCtx, analyser, freqData, gainNode;
var isRunning = false, isCalibrating = false;
var dominantFreq = 0, amplitude = 0;
var inputMode = 'voice';
var envelope = 0, energyEnv = 0, peakEnv = 0;
var autoGainRMS = 0, autoGain = 1.0, smoothCentroid = 500;
var pendingMode = null, pendingModeFrames = 0, MODE_HYSTERESIS = 15;
var noiseFloor = null, noiseGateRMS = 0;
var currentMode = {m:1, n:1, alpha:3.8317};
var lastModeKey = '1,1';
var currentLUT = null;
var particles = [];
var currentNote = null;

// ============ COLOR PALETTES ============
var PALETTES = [
  {name:'Sand',   h1:35,  h2:210, spread:20, dot:'#D4A056'},
  {name:'Purple', h1:270, h2:45,  spread:25, dot:'#8B5CF6'},
  {name:'Ocean',  h1:200, h2:15,  spread:25, dot:'#06B6D4'},
  {name:'Fire',   h1:15,  h2:220, spread:20, dot:'#F97316'},
  {name:'Neon',   h1:310, h2:150, spread:25, dot:'#EC4899'},
  {name:'Earth',  h1:120, h2:340, spread:30, dot:'#65A30D'},
  {name:'Ice',    h1:210, h2:30,  spread:15, dot:'#93C5FD'}
];
var currentPalette = PALETTES[0];

function paletteColor(pal){
  var base = Math.random() < 0.5 ? pal.h1 : pal.h2;
  var h = ((base + (Math.random()-0.5)*pal.spread) % 360 + 360) % 360;
  var s = 0.5 + Math.random()*0.4;
  var l = 0.35 + Math.random()*0.3;
  return {h:h/360, s:s, l:l};
}

function applyPalette(pal){
  if(!instancedSand) return;
  currentPalette = pal;
  var colorObj = new THREE.Color();
  for(var i=0;i<particles.length;i++){
    var c = paletteColor(pal);
    colorObj.setHSL(c.h, c.s, c.l);
    instancedSand.setColorAt(i, colorObj);
  }
  instancedSand.instanceColor.needsUpdate = true;
}

(function buildPaletteDots(){
  var cont = document.getElementById('palettes');
  PALETTES.forEach(function(pal, idx){
    var d = document.createElement('div');
    d.className = 'pdot' + (idx===0?' active':'');
    d.style.background = pal.dot;
    d.title = pal.name;
    d.onclick = function(){
      cont.querySelectorAll('.pdot').forEach(function(el){el.classList.remove('active');});
      d.classList.add('active');
      applyPalette(pal);
    };
    cont.appendChild(d);
  });
})();

// ============ 3D THREE.JS SETUP ============
var W = Math.min(innerWidth - 20, innerHeight - 160, 560);
var R = W/2 - 10;
var MAX_WAVE_DEPTH = R * 0.5;
var container = document.getElementById('canvas3d');
container.style.width = W + 'px';
container.style.height = W + 'px';

var scene = new THREE.Scene();

var camera = new THREE.PerspectiveCamera(40, 1, 0.1, 2000);
camera.position.set(0, W * 1.3, 0);
camera.lookAt(0, 0, 0);

var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(W, W);
renderer.setClearColor(0x0a0a0f, 1);
container.appendChild(renderer.domElement);

var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

var hemiLight = new THREE.HemisphereLight(0xffffff, 0x666688, 0.8);
scene.add(hemiLight);

var dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(100, 200, 50);
scene.add(dirLight);

var fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
fillLight.position.set(-100, -200, -50);
scene.add(fillLight);

// ============ INSTANCED MESH FÜR ECHTE SANDKÖRNER ============
var instancedSand;
var dummy = new THREE.Object3D();

function initParticles(count){
  particles=[];
  if(instancedSand) scene.remove(instancedSand);

  var sandGeom = new THREE.SphereGeometry(1.2, 8, 8);
  var sandMat = new THREE.MeshStandardMaterial({ roughness: 0.8, metalness: 0.2 });

  instancedSand = new THREE.InstancedMesh(sandGeom, sandMat, count);
  var colorObj = new THREE.Color();

  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2, r=Math.sqrt(Math.random())*0.95;

    var randomZ = (Math.random() - 0.5) * MAX_WAVE_DEPTH * Math.max(0.3, 1.0 - r);

    particles.push({x:r*Math.cos(a), y:r*Math.sin(a), z: randomZ, restZ: randomZ, vx:0, vy:0, vz:0});

    var pc = paletteColor(currentPalette);
    colorObj.setHSL(pc.h, pc.s, pc.l);
    instancedSand.setColorAt(i, colorObj);
  }

  instancedSand.instanceColor.needsUpdate = true;
  scene.add(instancedSand);
}
initParticles(15000);

// ============ BESSEL MATH ============
function besselJ(n, x){
  if(Math.abs(x)<1e-10) return n===0?1:0;
  var s=0, hx=x/2;
  for(var k=0;k<25;k++){
    var sign=k%2===0?1:-1;
    var num=Math.pow(hx,2*k+n);
    var den=1;
    for(var i=1;i<=k;i++) den*=i;
    for(var i=1;i<=k+n;i++) den*=i;
    s+=sign*num/den;
    if(Math.abs(num/den)<1e-15) break;
  }
  return s;
}

function waveHeight(m, alpha, r, th) {
    if(r > 1.0) return 0;
    var j = besselJ(m, alpha * r);
    var a = (m === 0) ? 1.0 : Math.cos(m * th);
    return j * a;
}

var ZEROS=[
  [2.4048,5.5201,8.6537,11.7915], [3.8317,7.0156,10.1735,13.3237], [5.1356,8.4172,11.6198,14.7960],
  [6.3802,9.7610,13.0152,16.2235], [7.5883,11.0647,14.3725,17.6160], [8.7715,12.3386,15.7002,18.9801],
  [9.9361,13.5893,17.0038,20.3208]
];

var MODES=[];
for(var m=0;m<=6;m++) for(var n=0;n<4;n++){
  if(m===0&&n===0) continue;
  MODES.push({m:m,n:n+1,alpha:ZEROS[m][n]});
}
MODES.sort(function(a,b){return a.alpha-b.alpha});

function Z2(m,alpha,r,th){
  var j=besselJ(m,alpha*r);
  var a=m===0?1:Math.cos(m*th);
  return j*a*j*a;
}

function potential(m,alpha,r,th){
  if(r>0.98) return 10;
  var z2=Z2(m,alpha,r,th);
  var edge=r>0.85? 0.5*Math.pow((r-0.85)/0.13, 3) : 0;
  return z2+edge;
}

function makeLUT(m,n,alpha){
  var lut=new Float32Array(GRID*GRID*2);
  var eps=2/GRID;
  for(var iy=0;iy<GRID;iy++) for(var ix=0;ix<GRID;ix++){
    var px=ix/(GRID-1)*2-1, py=iy/(GRID-1)*2-1;
    var rr=Math.sqrt(px*px+py*py);
    var base=(iy*GRID+ix)*2;
    if(rr>0.96||rr<0.001) continue;
    var pxp=px+eps, pxm=px-eps, pyp=py+eps, pym=py-eps;
    var rxp=Math.sqrt(pxp*pxp+py*py), rxm=Math.sqrt(pxm*pxm+py*py);
    var ryp=Math.sqrt(px*px+pyp*pyp), rym=Math.sqrt(px*px+pym*pym);
    lut[base]  =(potential(m,alpha,rxp,Math.atan2(py,pxp))-potential(m,alpha,rxm,Math.atan2(py,pxm)))/(2*eps);
    lut[base+1]=(potential(m,alpha,ryp,Math.atan2(pyp,px))-potential(m,alpha,rym,Math.atan2(pym,px)))/(2*eps);
  }
  var mx=0;
  for(var i=0;i<GRID*GRID;i++){var g=lut[i*2],h=lut[i*2+1];var mg=Math.sqrt(g*g+h*h);if(mg>mx)mx=mg;}
  if(mx>0) for(var i=0;i<GRID*GRID*2;i++) lut[i]/=mx;
  return lut;
}

function sampleLUT(lut,px,py){
  var fx=(px+1)/2*(GRID-1), fy=(py+1)/2*(GRID-1);
  var ix=Math.max(0,Math.min(GRID-2,fx|0)), iy=Math.max(0,Math.min(GRID-2,fy|0));
  var tx=fx-ix, ty=fy-iy;
  var a=(iy*GRID+ix)*2, b=a+2, c=((iy+1)*GRID+ix)*2, d=c+2;
  return [
    (1-ty)*((1-tx)*lut[a]+tx*lut[b])+ty*((1-tx)*lut[c]+tx*lut[d]),
    (1-ty)*((1-tx)*lut[a+1]+tx*lut[b+1])+ty*((1-tx)*lut[c+1]+tx*lut[d+1])
  ];
}

currentLUT = makeLUT(1,1,ZEROS[1][0]);

// ============ AUDIO INPUT CODE ============
async function listDevices(){
  var sel=document.getElementById('inputDevice');
  try{ var tmp=await navigator.mediaDevices.getUserMedia({audio:true}); tmp.getTracks().forEach(function(t){t.stop();}); }catch(e){return;}
  var devices=await navigator.mediaDevices.enumerateDevices();
  sel.innerHTML='<option value="">Default</option>';
  devices.forEach(function(d){
    if(d.kind==='audioinput'){
      var opt=document.createElement('option'); opt.value=d.deviceId; opt.textContent=d.label||('Mic '+d.deviceId.slice(0,8)); sel.appendChild(opt);
    }
  });
}

async function startAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  var deviceId=document.getElementById('inputDevice').value;
  var constraints={audio: deviceId ? {deviceId:{exact:deviceId}} : true};
  var stream=await navigator.mediaDevices.getUserMedia(constraints);
  var src=audioCtx.createMediaStreamSource(stream);
  var hp=audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=80; hp.Q.value=0.7;
  gainNode=audioCtx.createGain(); gainNode.gain.value=inputMode==='music'?0.25:1.0;
  analyser=audioCtx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=0.6; analyser.minDecibels=-90; analyser.maxDecibels=-10;
  src.connect(hp); hp.connect(gainNode); gainNode.connect(analyser);
  freqData=new Uint8Array(analyser.frequencyBinCount);
}

async function calibrate(){
  isCalibrating=true;
  var btn=document.getElementById('btnStart'); btn.textContent='Be silent...'; btn.style.background='#8a4a00';
  var bins=analyser.frequencyBinCount, acc=new Float32Array(bins), pk=new Float32Array(bins), frames=0;
  var t0=performance.now();
  await new Promise(function(done){
    (function tick(){
      analyser.getByteFrequencyData(freqData);
      for(var i=0;i<bins;i++){acc[i]+=freqData[i];if(freqData[i]>pk[i])pk[i]=freqData[i];}
      frames++; if(performance.now()-t0<2500) requestAnimationFrame(tick); else done();
    })();
  });
  noiseFloor=new Float32Array(bins);
  var ny=audioCtx.sampleRate/2, bHz=ny/bins, lo=Math.floor(60/bHz), hi=Math.min(Math.floor(3000/bHz),bins-1), tot=0, cnt=0;
  for(var i=0;i<bins;i++){var avg=acc[i]/frames;noiseFloor[i]=Math.max(avg*1.5,avg+(pk[i]-avg)*0.6);}
  for(var i=lo;i<=hi;i++){tot+=noiseFloor[i]*noiseFloor[i];cnt++;}
  noiseGateRMS=Math.sqrt(tot/(cnt||1));
  isCalibrating=false; btn.textContent='Stop'; btn.style.background=''; btn.classList.add('active');
}

function readAudio(){
  if(!analyser||isCalibrating) return;
  analyser.getByteFrequencyData(freqData);
  var sens=parseFloat(document.getElementById('slSens').value);
  var ny=audioCtx.sampleRate/2, bHz=ny/analyser.frequencyBinCount;
  var lo=Math.floor(60/bHz), hi=Math.min(Math.floor(3000/bHz),freqData.length-1);
  var mxV=0,mxB=0;
  for(var i=lo;i<=hi;i++){
    var c=noiseFloor?Math.max(0,freqData[i]-noiseFloor[i]):freqData[i];
    if(c>mxV){mxV=c;mxB=i;}
  }
  if(mxB>lo&&mxB<hi&&mxV>5){
    var a=Math.max(0,freqData[mxB-1]-(noiseFloor?noiseFloor[mxB-1]:0));
    var b=mxV;
    var c=Math.max(0,freqData[mxB+1]-(noiseFloor?noiseFloor[mxB+1]:0));
    var den=2*(a-2*b+c);
    dominantFreq=(mxB+(den?((a-c)/den):0))*bHz;
  } else dominantFreq=mxB*bHz;
  var sum=0,cnt=0,hot=0;
  for(var i=lo;i<=hi;i++){
    var c=noiseFloor?Math.max(0,freqData[i]-noiseFloor[i]):freqData[i];
    sum+=c*c; cnt++;
    if(noiseFloor&&freqData[i]>noiseFloor[i]*1.8) hot++;
  }
  var rms=Math.sqrt(sum/(cnt||1));

  if(inputMode==='voice'){
    var gate=noiseFloor?noiseGateRMS*1.2:20;
    var gated=(rms<gate||mxV<20||hot<3)?0:rms/255*sens;
    var freqRatio=Math.max(0,Math.min(1,(dominantFreq-80)/(2000-80)));
    var dynFall=0.95-(0.95-0.88)*freqRatio;
    if(gated>envelope){ envelope=gated; } else { envelope*=dynFall; }
    if(envelope<0.001) envelope=0;
    amplitude=envelope;
  } else {
    var bins=analyser.frequencyBinCount, bHz=ny/bins;
    var bassLo=Math.floor(30/bHz), bassHi=Math.floor(200/bHz);
    var midLo=Math.floor(200/bHz), midHi=Math.floor(2000/bHz);
    var hiLo=Math.floor(2000/bHz), hiHi=Math.min(Math.floor(8000/bHz),bins-1);

    var bassSum=0,bassCnt=0, midSum=0,midCnt=0, hiSum=0,hiCnt=0, centNum=0, centDen=0;
    for(var i=bassLo;i<=hiHi;i++){
      var v=freqData[i], freq_i=i*bHz;
      if(i<=bassHi){ bassSum+=v*v; bassCnt++; } else if(i<=midHi){ midSum+=v*v; midCnt++; } else { hiSum+=v*v; hiCnt++; }
      centNum+=v*v*freq_i; centDen+=v*v;
    }
    var bassRMS=Math.sqrt(bassSum/(bassCnt||1)), midRMS=Math.sqrt(midSum/(midCnt||1)), hiRMS=Math.sqrt(hiSum/(hiCnt||1));
    var bandEnergy = bassRMS*0.55 + midRMS*0.30 + hiRMS*0.15;

    autoGainRMS += (bandEnergy - autoGainRMS) * 0.008;
    if(autoGainRMS > 3){ autoGain += (Math.max(0.05, Math.min(6.0, 80 / autoGainRMS)) - autoGain) * 0.01; }

    var scaled = bandEnergy * autoGain / 255 * sens, gated = bandEnergy > 2 ? scaled : 0;
    var freqRatio=Math.max(0,Math.min(1,(smoothCentroid-80)/(2000-80)));
    var dynEnergyFall=0.99-(0.99-0.975)*freqRatio, dynPeakFall=0.94-(0.94-0.88)*freqRatio, dynAttackAlpha=0.08+(0.25-0.08)*freqRatio;

    if(gated > energyEnv){ energyEnv += (gated - energyEnv) * dynAttackAlpha; } else { energyEnv *= dynEnergyFall; }
    if(energyEnv < 0.001) energyEnv = 0;
    if(gated > peakEnv){ peakEnv = gated; } else { peakEnv *= dynPeakFall; }
    if(peakEnv < 0.001) peakEnv = 0;

    amplitude = energyEnv * 0.6 + peakEnv * 0.4;
    if(centDen > 0){ smoothCentroid += ((centNum / centDen) - smoothCentroid) * 0.03; }
  }

  if(amplitude>0 && dominantFreq>60){
    var sf = smoothPitch(dominantFreq); currentNote = freqToNote(sf);
    if(currentNote) smoothedCents += (currentNote.cents - smoothedCents) * 0.2;
  } else { currentNote = null; freqHistory = []; smoothedCents = 0; }
}

function updateMode(){
  if(amplitude<0.05) return;
  var f = inputMode==='music' ? smoothCentroid : dominantFreq;
  var t=f<80?0:Math.min(1,(f-80)/(2000-80));
  var idx=Math.min(MODES.length-1,t*MODES.length|0);
  var mode=MODES[idx];
  var key=mode.m+','+mode.n;

  if(key!==lastModeKey){
    if(inputMode==='music'){
      if(key===pendingMode){
        pendingModeFrames++;
        if(pendingModeFrames >= MODE_HYSTERESIS){
          lastModeKey=key; currentMode=mode; currentLUT=makeLUT(mode.m,mode.n,mode.alpha); pendingMode=null; pendingModeFrames=0;
        }
      } else { pendingMode=key; pendingModeFrames=1; }
    } else { lastModeKey=key; currentMode=mode; currentLUT=makeLUT(mode.m,mode.n,mode.alpha); }
  } else { pendingMode=null; pendingModeFrames=0; }
}

var simTime = 0;

function stepSand(dt){
  var isMusic = inputMode === 'music';
  var fs = Math.min(amplitude, 1) * (isMusic ? 0.25 : 0.15);
  var fric = Math.pow(isMusic ? 0.12 : 0.05, dt);
  var maxSpd = isMusic ? 0.015 : 0.02;

  simTime += dt;
  var grainScale = isMusic ? 1.2 : 1.0;

  for(var i=0; i<particles.length; i++){
    var p = particles[i];

    var r = Math.sqrt(p.x*p.x + p.y*p.y);
    var th = Math.atan2(p.y, p.x);
    var height = waveHeight(currentMode.m, currentMode.alpha, r, th);

    var waveZ = height * Math.sin(simTime * 25.0) * amplitude * MAX_WAVE_DEPTH;
    var vibrationIntensity = Math.abs(height) * amplitude;

    if(fs > 0.001){
        // 1. 2D pattern formation (pulls particles to nodal lines)
        var g = sampleLUT(currentLUT, p.x, p.y);
        p.vx -= g[0] * fs;
        p.vy -= g[1] * fs;

        // 2. Z-axis: volume grows with audio, collapses to flat at silence
        var vol = Math.min(1, amplitude * 3);
        var targetZ = p.restZ * vol + height * amplitude * MAX_WAVE_DEPTH;
        p.z += (targetZ - p.z) * 0.1;

        // 3. Wind-like turbulence at antinodes (shows force)
        if (vibrationIntensity > 0.01) {
            p.vz += (Math.random() - 0.5) * vibrationIntensity * 40.0 * dt;
            p.vx += (Math.random() - 0.5) * vibrationIntensity * 6.0 * dt;
            p.vy += (Math.random() - 0.5) * vibrationIntensity * 6.0 * dt;
        }
    }

    // Speed limit
    var sp = Math.sqrt(p.vx*p.vx + p.vy*p.vy + p.vz*p.vz);
    var limit = maxSpd * 1.5;
    if(sp > limit){
        var scale = limit / sp;
        p.vx *= scale; p.vy *= scale; p.vz *= scale;
    }

    // Friction freezes the sculpture in 3D when audio stops
    p.vx *= fric;
    p.vy *= fric;
    p.vz *= fric;

    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.z += p.vz * dt * 60;

    // Circle boundary
    var rNew = Math.sqrt(p.x*p.x + p.y*p.y);
    if(rNew > 0.96){
      p.x = p.x/rNew*0.95;
      p.y = p.y/rNew*0.95;
      p.vx *= -0.2;
      p.vy *= -0.2;
    }

    // Update Three.js
    dummy.position.set(p.x * R, p.z, p.y * R);
    dummy.scale.set(grainScale, grainScale, grainScale);
    dummy.updateMatrix();
    instancedSand.setMatrixAt(i, dummy.matrix);
  }

  instancedSand.instanceMatrix.needsUpdate = true;
}

function updatePitchUI(){
  var nameEl=document.getElementById('noteName');
  var centsEl=document.getElementById('cents');
  var barEl=document.getElementById('centsIndicator');
  var freqEl=document.getElementById('freqSmall');

  if(!isRunning || !currentNote){
    nameEl.textContent='--'; nameEl.style.color='#e0e0e0';
    centsEl.innerHTML='&nbsp;'; barEl.style.left='50%'; barEl.style.background='#4a9ed6';
    freqEl.textContent=isRunning?Math.round(dominantFreq)+' Hz':'-- Hz';
    return;
  }
  var n=currentNote;
  nameEl.textContent=n.name+n.octave;
  freqEl.textContent=Math.round(smoothedFreq)+' Hz';
  var sc=smoothedCents, ac=Math.abs(sc), label=Math.round(sc), prefix=label>0?'+':'';
  if(ac<10){ centsEl.textContent='In tune'; centsEl.style.color='#5cb85c'; nameEl.style.color='#5cb85c'; }
  else if(ac<25){ centsEl.textContent=prefix+label+' cents'; centsEl.style.color='#e8c33a'; nameEl.style.color='#e8c33a'; }
  else { centsEl.textContent=prefix+label+' cents'; centsEl.style.color='#d9534f'; nameEl.style.color='#d9534f'; }
  var pct=50+Math.max(-50,Math.min(50,sc));
  barEl.style.left=pct+'%';
  barEl.style.background=ac<10?'#5cb85c':ac<25?'#e8c33a':'#d9534f';
}

var lastT=0, fc=0, ft=0, fps=0;

function loop(t){
  requestAnimationFrame(loop);
  var dt=Math.min(0.033,(t-lastT)/1000); lastT=t;
  fc++; ft+=dt;
  if(ft>=1){fps=Math.round(fc/ft);fc=0;ft=0;}

  if(isRunning){readAudio();updateMode();}

  stepSand(dt);

  controls.update();
  renderer.render(scene, camera);

  updatePitchUI();

  document.getElementById('dMode').textContent='Mode ('+currentMode.m+','+currentMode.n+')';
  document.getElementById('dCount').textContent=particles.length+' particles';
  document.getElementById('dFps').textContent=fps+' fps';
}
requestAnimationFrame(loop);

// ============ UI EVENTS ============
document.getElementById('btnStart').onclick=async function(){
  if(!isRunning&&!isCalibrating){
    try{
      await startAudio();
      if(inputMode==='voice') await calibrate();
      else{ document.getElementById('btnStart').textContent='Stop'; document.getElementById('btnStart').classList.add('active'); }
      isRunning=true;
    }catch(e){alert('Mic: '+e.message);}
  } else if(isRunning){
    isRunning=false;amplitude=0;envelope=0;energyEnv=0;peakEnv=0;noiseFloor=null;currentNote=null;
    this.textContent='Start';this.classList.remove('active');
  }
};

document.getElementById('btnMode').onclick=function(){
  if(inputMode==='voice'){
    inputMode='music'; this.textContent='Music'; this.classList.add('active');
    autoGain=1.0; autoGainRMS=0; energyEnv=0; peakEnv=0; smoothCentroid=500; pendingMode=null; pendingModeFrames=0;
  } else { inputMode='voice'; this.textContent='Voice'; this.classList.remove('active'); }
  if(gainNode) gainNode.gain.value=inputMode==='music'?0.25:1.0;
};

document.getElementById('btnReset').onclick=function(){ initParticles(Math.min(parseInt(document.getElementById('slCount').value),MAX_P)); };
document.getElementById('slCount').oninput=function(){ initParticles(Math.min(parseInt(this.value),MAX_P)); };

document.getElementById('btnCam').onclick=function(){
  camera.position.set(0, W * 1.3, 0);
  camera.lookAt(0, 0, 0);
  controls.target.set(0, 0, 0);
  controls.update();
};

listDevices();
navigator.mediaDevices.addEventListener('devicechange', listDevices);

})();
</script>
